<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> 
  
  <style>
    body { width: 300px; height: 400px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; position: relative; }
    .view { padding: 20px; height: 100%; box-sizing: border-box; transition: 0.3s ease; position: absolute; width: 100%; background: #fff; }
    #searchBar { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #dfe1e5; font-size: 14px; outline: none; box-shadow: 0 1px 6px rgba(32,33,36,0.2); }
    #linksList { margin-top: 15px; height: 280px; overflow-y: auto; }
    .link-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
    .link-item:hover { background: #f8f9fa; }
    .gear-btn { position: absolute; bottom: 15px; right: 15px; background: none; border: none; font-size: 22px; cursor: pointer; opacity: 0.5; }
    .gear-btn:hover { opacity: 1; }
    #settingsView { left: 100%; z-index: 10; border-left: 1px solid #eee; }
    #settingsView.active { left: 0; }
    .search-icon-header { font-size: 40px; text-align: center; display: block; margin-bottom: 10px; color: #4285f4; }
    input.form-input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
    .save-btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .back-btn { background: none; border: none; color: #70757a; cursor: pointer; font-size: 14px; margin-bottom: 10px; padding: 0; }
  </style>
</head>
<body>

  <div id="mainView" class="view">
    <input type="text" id="searchBar" placeholder="Search saved links...">
    <div id="linksList"></div>
    <button id="openSettings" class="gear-btn">&#9881;</button>
  </div>

  <div id="settingsView" class="view">
    <button id="closeSettings" class="back-btn">&larr; Back</button>
    <span class="search-icon-header">Settings</span>
    <input type="text" id="newName" class="form-input" placeholder="Name (e.g. Youtube)">
    <input type="text" id="newUrl" class="form-input" placeholder="URL (https://...)">
    <input type="text" id="newInfo" class="form-input" placeholder="Extra Info (Videos)">
    <button id="saveBtn" class="save-btn">Save Shortcut</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
